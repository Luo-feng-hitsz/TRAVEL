data:
  train_batch_size: 8
  micro_batch_size_per_gpu: 1
  train_files: /data1/luofeng/RL/verl/data/sft_data/train_step.parquet
  val_files: /data1/luofeng/RL/verl/data/sft_data/test_step.parquet
  prompt_key: prompt
  response_key: answer
  prompt_dict_keys: null
  response_dict_keys: null
  multiturn:
    enable: false
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  max_length: 8192
  truncation: error
  balance_dp_token: false
  chat_template: null
  custom_cls:
    path: null
    name: null
  use_shm: false
model:
  partial_pretrain: /data1/luofeng/models/codegemma-7b-it
  use_shm: false
  fsdp_config:
    model_dtype: bf16
    wrap_policy:
      min_num_params: 0
    cpu_offload: false
    offload_params: false
  external_lib: null
  enable_gradient_checkpointing: true
  trust_remote_code: true
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  use_liger: false
  strategy: fsdp2
optim:
  lr: 1.0e-05
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad: 1.0
  lr_scheduler: cosine
ulysses_sequence_parallel_size: 1
use_remove_padding: false
trainer:
  default_local_dir: /data1/luofeng/RL/checkpoints/${trainer.project_name}/${trainer.experiment_name}
  project_name: c2rust-sft-step-v3
  experiment_name: codegemma-7B-it
  total_epochs: 2
  logger:
  - console
  - wandb
  total_training_steps: null
  save_freq: 500
  test_freq: 100
  default_hdfs_dir: null
