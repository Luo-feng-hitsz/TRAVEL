hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.train_files=/data1/luofeng/RL/data/train.parquet
    - data.val_files=/data1/luofeng/RL/data/test.parquet
    - data.train_batch_size=1024
    - data.max_prompt_length=512
    - data.max_response_length=1024
    - actor_rollout_ref.model.path=/data1/luofeng/RL/checkpoints/c2rust-sft/qwen2.5-1.5B/global_step_3861
    - actor_rollout_ref.model.use_remove_padding=true
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.actor.ppo_mini_batch_size=256
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=32
    - actor_rollout_ref.actor.loss_agg_mode=seq-mean-token-sum-norm
    - actor_rollout_ref.actor.use_dynamic_bsz=true
    - actor_rollout_ref.actor.fsdp_config.param_offload=false
    - actor_rollout_ref.actor.fsdp_config.optimizer_offload=false
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.dtype=bfloat16
    - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=1
    - actor_rollout_ref.rollout.tensor_model_parallel_size=2
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.4
    - actor_rollout_ref.rollout.n=4
    - actor_rollout_ref.rollout.max_num_batched_tokens=8192
    - actor_rollout_ref.rollout.max_num_seqs=512
    - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=16
    - algorithm.adv_estimator=grpo
    - algorithm.kl_ctrl.kl_coef=0.001
    - custom_reward_function.path=/data1/luofeng/RL/verl/reward_fn/bleu.py
    - custom_reward_function.name=compute_score
    - trainer.val_before_train=true
    - trainer.n_gpus_per_node=2
    - trainer.nnodes=1
    - trainer.save_freq=50
    - trainer.test_freq=10
    - trainer.total_epochs=10
    - trainer.resume_mode=disable
    - trainer.logger=["console","wandb"]
    - trainer.project_name=c2rust-rl
    - trainer.experiment_name=qwen2.5-1.5B
  job:
    name: main_ppo
    chdir: null
    override_dirname: actor_rollout_ref.actor.fsdp_config.optimizer_offload=false,actor_rollout_ref.actor.fsdp_config.param_offload=false,actor_rollout_ref.actor.loss_agg_mode=seq-mean-token-sum-norm,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=32,actor_rollout_ref.actor.ppo_mini_batch_size=256,actor_rollout_ref.actor.use_dynamic_bsz=true,actor_rollout_ref.model.path=/data1/luofeng/RL/checkpoints/c2rust-sft/qwen2.5-1.5B/global_step_3861,actor_rollout_ref.model.use_remove_padding=true,actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=16,actor_rollout_ref.rollout.dtype=bfloat16,actor_rollout_ref.rollout.gpu_memory_utilization=0.4,actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=1,actor_rollout_ref.rollout.max_num_batched_tokens=8192,actor_rollout_ref.rollout.max_num_seqs=512,actor_rollout_ref.rollout.n=4,actor_rollout_ref.rollout.name=vllm,actor_rollout_ref.rollout.tensor_model_parallel_size=2,algorithm.adv_estimator=grpo,algorithm.kl_ctrl.kl_coef=0.001,custom_reward_function.name=compute_score,custom_reward_function.path=/data1/luofeng/RL/verl/reward_fn/bleu.py,data.max_prompt_length=512,data.max_response_length=1024,data.train_batch_size=1024,data.train_files=/data1/luofeng/RL/data/train.parquet,data.val_files=/data1/luofeng/RL/data/test.parquet,trainer.experiment_name=qwen2.5-1.5B,trainer.logger=["console","wandb"],trainer.n_gpus_per_node=2,trainer.nnodes=1,trainer.project_name=c2rust-rl,trainer.resume_mode=disable,trainer.save_freq=50,trainer.test_freq=10,trainer.total_epochs=10,trainer.val_before_train=true
    id: ???
    num: ???
    config_name: ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /data1/luofeng/RL/verl
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data1/luofeng/RL/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data1/luofeng/RL/verl/outputs/2025-12-08/18-44-49
    choices:
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      data: legacy_data
      npu_profile@trainer.npu_profile: npu_profile
      actor@actor_rollout_ref.actor: dp_actor
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
