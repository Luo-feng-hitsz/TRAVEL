data:
  train_batch_size: 16
  micro_batch_size_per_gpu: 1  
  train_files: ./verl/data/sft_data/train_no_step.parquet   
  val_files: ./verl/data/sft_data/test_no_step.parquet    

  prompt_key: prompt       
  response_key: answer
  prompt_dict_keys: null
  response_dict_keys: null
  
  multiturn:
    enable: false
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  max_length: 4096       
  truncation: error
  balance_dp_token: False
  chat_template: null
  custom_cls:
    path: null
    name: null
  use_shm: False

model:
  partial_pretrain: ./Qwen2.5-Coder-7B-Instruct     # YOUR MODEL PATH
  use_shm: False
  fsdp_config:
    model_dtype: bf16     
    wrap_policy:
      min_num_params: 0
    cpu_offload: False
    offload_params: False
  external_lib: null
  enable_gradient_checkpointing: True
  trust_remote_code: True   
  lora_rank: 0             
  lora_alpha: 16
  target_modules: all-linear
  use_liger: False
  strategy: fsdp2      

optim:
  lr: 1e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad: 1.0
  lr_scheduler: cosine

ulysses_sequence_parallel_size: 1
use_remove_padding: False

trainer:
  default_local_dir: ./checkpoints/${trainer.project_name}/${trainer.experiment_name}
  project_name: c2rust-sft-no-step-v3       
  experiment_name: qwen2.5-7B    
  total_epochs: 2                  
  logger: [ 'console', 'wandb']
  total_training_steps: null   
  # seed: 1

  save_freq: 500                   
  test_freq: 100
  default_hdfs_dir: null  
  # nnodes: 1
  # n_gpus_per_node: 4              
  # max_ckpt_to_keep: 3

